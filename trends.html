<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPC 博客 — Solarian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0f1a;
  --bg-card:#141418;
  --bg-card-hover:#1a1a20;
  --border:rgba(255,255,255,0.06);
  --border-hover:rgba(255,255,255,0.12);
  --text:rgba(255,255,255,0.9);
  --text-sub:rgba(255,255,255,0.5);
  --text-dim:rgba(255,255,255,0.25);
  --accent:#14b8a6;
  --accent-sub:rgba(20,184,166,0.15);
  --accent-glow:rgba(20,184,166,0.08);
  --font-display:'Space Grotesk','Noto Sans SC',sans-serif;
  --font-body:'DM Sans','Noto Sans SC',sans-serif;
  --ease:cubic-bezier(0.25,1,0.5,1);
  --tag-policy:#3b82f6;
  --tag-case:#22c55e;
  --tag-trend:#a855f7;
  --tag-opinion:#f97316;
  --tag-insight:#14b8a6;
  --tag-story:#ec4899;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  font-weight:350;
}
a{color:inherit;text-decoration:none}

/* ========== SPOTLIGHT ========== */
.spotlight{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(20,184,166,0.04),transparent 60%);
}

/* ========== AMBIENT PARTICLES ========== */
.particles{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}
.particles span{
  position:absolute;
  width:2px;height:2px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  animation:drift linear infinite;
}
@keyframes drift{
  0%{transform:translateY(0) scale(1);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-100vh) scale(0.5);opacity:0}
}

/* ========== SCROLL REVEAL ========== */
.reveal{opacity:0;transform:translateY(36px)}
.reveal.vis{opacity:1;animation:springUp .85s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes springUp{
  0%{opacity:0;transform:translateY(36px)}
  60%{opacity:1;transform:translateY(-5px)}
  80%{transform:translateY(2px)}
  100%{opacity:1;transform:translateY(0)}
}
@media(prefers-reduced-motion:reduce){.reveal.vis{animation:none;opacity:1;transform:none}}

/* ========== LAYOUT ========== */
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding-inline:40px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center}

/* ========== NAV ========== */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:16px 0;
  transition:background .3s,border-color .3s;
  border-bottom:1px solid transparent;
}
nav.scrolled{
  background:rgba(10,15,26,0.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom-color:var(--border);
}
.nav-inner{
  width:100%;max-width:none;padding-inline:40px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:var(--font-display);font-size:1.05rem;font-weight:600;
  display:flex;align-items:center;gap:9px;letter-spacing:-.3px;
}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none}
.nav-links a{font-size:.85rem;font-weight:400;color:var(--text-sub);transition:color .2s}
.nav-links a:hover{color:var(--text)}

/* ========== BUTTONS ========== */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:100px;
  font-family:var(--font-body);font-size:.88rem;font-weight:500;
  border:1px solid var(--border);background:transparent;color:var(--text);
  cursor:pointer;transition:all .25s var(--ease);
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  transition:none;
}
.btn:hover::after{left:120%;transition:left .6s var(--ease)}
.btn:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn svg{width:14px;height:14px;transition:transform .3s var(--ease)}
.btn:hover svg{transform:translateX(4px)}

.btn-fill{
  background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600;
}
.btn-fill:hover{border-color:var(--accent)}
.btn-fill::after{
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
}
.btn-nav{padding:7px 18px;font-size:.82rem;border-radius:100px}

/* ========== PAGE HERO ========== */
.page-hero h1 em{font-style:normal;color:var(--accent)}

/* ========== GALLERY GRID ========== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  margin-top:20px;
}

/* ========== GALLERY CARD ========== */
.gallery-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:all .3s var(--ease);
  display:flex;flex-direction:column;
}
.gallery-card:hover{
  border-color:var(--border-hover);
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,0.3);
}

.card-cover{
  aspect-ratio:16/10;
  width:100%;
  object-fit:cover;
  display:block;
  border-radius:12px 12px 0 0;
}
.card-cover-placeholder{
  aspect-ratio:16/10;
  width:100%;
  border-radius:12px 12px 0 0;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  color:rgba(255,255,255,0.15);
}
.card-cover-placeholder.grad-1{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.card-cover-placeholder.grad-2{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)}
.card-cover-placeholder.grad-3{background:linear-gradient(135deg,#1a0533,#2d1b69,#1a1a2e)}
.card-cover-placeholder.grad-4{background:linear-gradient(135deg,#1b1b2f,#162447,#1f4068)}
.card-cover-placeholder.grad-5{background:linear-gradient(135deg,#0d1b2a,#1b2838,#2d4654)}
.card-cover-placeholder.grad-6{background:linear-gradient(135deg,#1a1a2e,#2a1a3e,#1a2a3e)}

.card-body{
  padding:16px;
  display:flex;flex-direction:column;gap:8px;
  flex:1;
}

.card-tag{
  display:inline-flex;
  align-self:flex-start;
  font-size:.65rem;
  font-weight:600;
  letter-spacing:.5px;
  padding:3px 10px;
  border-radius:100px;
  text-transform:uppercase;
}
.tag-policy{background:rgba(59,130,246,0.15);color:var(--tag-policy)}
.tag-case{background:rgba(34,197,94,0.15);color:var(--tag-case)}
.tag-trend{background:rgba(168,85,247,0.15);color:var(--tag-trend)}
.tag-opinion{background:rgba(249,115,22,0.15);color:var(--tag-opinion)}
.tag-insight{background:rgba(20,184,166,0.15);color:var(--tag-insight)}
.tag-story{background:rgba(236,72,153,0.15);color:var(--tag-story)}

.card-title{
  font-family:var(--font-display);
  font-size:.95rem;
  font-weight:600;
  line-height:1.35;
  letter-spacing:-.3px;
}
.card-desc{
  font-size:.78rem;
  color:var(--text-sub);
  line-height:1.55;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-meta{
  font-size:.68rem;
  color:var(--text-dim);
  margin-top:auto;
  padding-top:4px;
}

/* ========== ARTICLE VIEW WITH LEFT SIDEBAR ========== */
.article-layout{
  max-width:1120px;margin:120px auto 0;
  padding:0 40px;
  display:grid;grid-template-columns:220px 1fr;
  gap:60px;align-items:start;
}

/* Left sidebar — sticky navigation */
.sub-sidebar{
  position:sticky;top:100px;
  padding-top:8px;
}
.sub-sidebar-back{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;
  border:1px solid var(--border);border-radius:100px;
  color:var(--text-sub);
  font-size:.82rem;font-weight:500;
  cursor:pointer;background:transparent;
  transition:all .2s var(--ease);
  margin-bottom:40px;
  font-family:var(--font-body);
}
.sub-sidebar-back:hover{
  border-color:var(--accent);color:var(--accent);
  transform:translateX(-3px);
}
.sub-sidebar-back svg{width:12px;height:12px}

.sub-sidebar-label{
  font-family:var(--font-display);
  font-size:.68rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:14px;
  padding-left:16px;
}
.sub-sidebar-toc{
  list-style:none;padding:0;margin:0 0 32px;
  border-left:1px solid var(--border);
}
.sub-sidebar-toc li{margin:0}
.sub-sidebar-toc a{
  display:block;padding:9px 16px;
  font-size:.84rem;line-height:1.4;
  color:var(--text-sub);
  border-left:2px solid transparent;margin-left:-1px;
  transition:all .18s var(--ease);
  cursor:pointer;
}
.sub-sidebar-toc a:hover{
  color:var(--text);border-left-color:rgba(255,255,255,0.2);
}
.sub-sidebar-toc a.active{
  color:var(--accent);border-left-color:var(--accent);
  font-weight:500;background:var(--accent-sub);
}

.sub-sidebar-meta{
  padding:16px;border-top:1px solid var(--border);
  font-size:.74rem;color:var(--text-dim);
  line-height:1.6;
}
.sub-sidebar-meta strong{
  display:block;color:var(--text-sub);font-weight:600;
  font-family:var(--font-display);
  margin-bottom:4px;
}

.article-main{min-width:0;padding-bottom:80px}

/* Article content styles */
.article-page .article-cover{
  width:100%;border-radius:12px;margin-bottom:24px;
  display:block;
}
.article-page .article-cover-grad{
  width:100%;aspect-ratio:16/9;border-radius:12px;margin-bottom:24px;
}
.article-page .card-tag{margin-bottom:12px}
.article-page h1{
  font-family:var(--font-display);
  font-size:clamp(1.3rem,2.5vw,1.6rem);
  font-weight:700;color:#fff;
  margin-bottom:12px;line-height:1.3;
  letter-spacing:-1px;
}
.article-page .article-meta{
  font-size:.78rem;color:rgba(255,255,255,0.35);
  margin-bottom:24px;padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.article-page .article-body{
  font-size:.92rem;color:rgba(255,255,255,0.7);line-height:1.9;
}
.article-page .article-body p{margin-bottom:16px}
.article-page .article-body p:last-child{margin-bottom:0}
.article-page .article-body strong{color:var(--text);font-weight:500}
.article-page .article-body blockquote{
  border-left:3px solid var(--accent);
  padding-left:16px;
  margin:20px 0;
  font-style:italic;
  color:var(--text-sub);
}
.article-page .article-body h2{
  font-family:var(--font-display);
  font-size:1.2rem;font-weight:700;
  color:var(--text);margin:36px 0 16px;
  letter-spacing:-.5px;
  scroll-margin-top:100px;
}
.article-page .article-body p.lede{
  font-size:1.05rem;line-height:1.8;
  color:var(--text);margin-bottom:28px;font-weight:400;
}
.article-page .article-body .section-break{
  width:70px;height:2px;background:var(--accent);
  margin:40px auto;border-radius:2px;opacity:.35;
}
.article-page .article-body .signature{
  margin-top:40px;padding-top:20px;
  border-top:1px solid var(--border);text-align:center;
  font-family:var(--font-display);
  font-size:.82rem;color:var(--text-sub);line-height:1.7;
}
.article-page .article-body .signature strong{
  display:block;color:var(--text);font-size:.92rem;margin-bottom:4px;
}
.article-page .article-body ol.references{
  list-style:decimal;
  margin:0 0 24px 0;padding-left:24px;
  font-size:.78rem;color:var(--text-sub);line-height:1.7;
}
.article-page .article-body ol.references li{margin-bottom:8px}
.article-page .article-body ol.references a{
  color:var(--accent);word-break:break-all;
  text-decoration:underline;text-decoration-color:var(--accent-sub);
  text-underline-offset:2px;
}
.article-page .article-body ol.references a:hover{
  text-decoration-color:var(--accent);
}
.article-page .article-body sup{
  font-size:.65em;color:var(--accent);font-weight:600;
}
.article-page .article-body sup a{color:inherit;text-decoration:none}
.article-page .article-body sup a:hover{text-decoration:underline}
.article-page .article-body ul,.article-page .article-body ol{
  margin:0 0 20px;padding-left:24px;
}
.article-page .article-body li{margin-bottom:8px}

/* ========== CTA BOX ========== */
.cta-box{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;padding:72px 40px;text-align:center;
  position:relative;overflow:hidden;
}
.cta-box::before{
  content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:400px;height:250px;
  background:radial-gradient(ellipse,var(--accent-glow),transparent 70%);
  pointer-events:none;
}
.cta-box h2 em{font-style:normal;color:var(--accent)}
.cta-sub{font-size:.92rem;color:var(--text-sub);margin-bottom:32px;position:relative}

/* ========== FOOTER ========== */
footer{
  position:relative;z-index:1;
  border-top:1px solid var(--border);padding:32px 0;
}
.footer-inner{
  max-width:1100px;margin:0 auto;padding-inline:40px;
  display:flex;justify-content:space-between;align-items:center;
}
.footer-copy{font-size:.72rem;color:var(--text-dim)}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:.72rem;color:var(--text-dim);transition:color .2s}
.footer-links a:hover{color:var(--text-sub)}

/* ========== RESPONSIVE ========== */
@media(max-width:960px){
  .article-layout{
    grid-template-columns:1fr;gap:24px;margin-top:100px;
  }
  .sub-sidebar{
    position:static;padding:0 0 24px;
    border-bottom:1px solid var(--border);margin-bottom:16px;
  }
  .sub-sidebar-toc,.sub-sidebar-label,.sub-sidebar-meta{display:none}
  .sub-sidebar-back{margin-bottom:16px}
}
@media(max-width:768px){
  .wrap{padding-inline:20px}
  .nav-inner{padding-inline:20px}
  .nav-links{gap:16px}
  .gallery{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .cta-box{padding:48px 20px}
  .footer-inner{flex-direction:column;gap:16px;text-align:center}
  .article-layout{padding:0 20px}
  .article-main{padding-bottom:60px}
}

/* ========== UNIFIED NAV OVERRIDE (matches index.html scrolled state) ========== */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:16px 0;
  background:rgba(30,40,60,0.88) !important;
  backdrop-filter:blur(36px) saturate(180%);-webkit-backdrop-filter:blur(36px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,0.1) !important;
}
.nav-inner{
  max-width:none !important;padding-inline:48px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
}
nav .logo{color:#fff !important;font-family:var(--font-display);font-size:1.05rem;font-weight:600;display:flex;align-items:center;gap:9px;letter-spacing:-.3px}
nav .nav-links{display:flex;align-items:center;gap:40px;list-style:none}
nav .nav-links a{color:rgba(255,255,255,0.72) !important;font-size:.85rem;font-weight:400;transition:color .2s}
nav .nav-links a:hover{color:#fff !important}
nav .nav-links a.current{color:#4FD1C5 !important;font-weight:500}

/* Dropdown */
.nav-dropdown{position:relative}
.nav-dd-trigger{cursor:pointer}
.nav-dd-menu{
  position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%);
  min-width:260px;background:rgba(15,23,41,0.95);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:8px;
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .2s,transform .2s,visibility .2s;
  transform:translateX(-50%) translateY(-6px);
}
.nav-dropdown:hover .nav-dd-menu{
  opacity:1;visibility:visible;pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}
.dd-item{display:block;padding:10px 14px;border-radius:8px;text-decoration:none;transition:background .15s}
.dd-item:hover{background:rgba(255,255,255,0.04)}
.dd-item strong{display:block;font-size:.85rem;font-weight:600;color:rgba(255,255,255,0.9) !important;margin-bottom:2px}
.dd-item span{display:block;font-size:.72rem;color:rgba(255,255,255,0.55) !important;line-height:1.4}
.dd-footer{border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;padding-top:4px}
.dd-footer a{display:block;padding:8px 14px;font-size:.75rem;color:#4FD1C5 !important}

/* Lang toggle */
.lang-toggle{
  display:inline-flex;
  border:1px solid rgba(255,255,255,0.14);border-radius:100px;overflow:hidden;
  background:rgba(255,255,255,0.02);cursor:pointer;
}
.lang-toggle span{padding:4px 10px;font-size:.72rem;font-weight:600;color:rgba(255,255,255,0.55) !important;transition:all .2s}
.lang-toggle span.active{color:#4FD1C5 !important;background:rgba(13,148,136,0.22)}
</style>
</head>

<!-- ========== PAGE HERO ========== -->
<div id="blogGallery">
<section class="page-hero wrap center" style="min-height:auto;padding-top:160px;padding-bottom:40px">
  <h1 style="font-family:var(--font-display);font-size:clamp(1.8rem,3vw,2.6rem);font-weight:700;letter-spacing:-1.5px;line-height:1.15">OPC <em>博客</em></h1>

<!-- ========== GALLERY ========== -->

</section>

<!-- ========== BOTTOM CTA ========== -->
<section class="wrap center" style="padding-bottom:120px">
  <div class="cta-box reveal">
    <h2 style="font-family:var(--font-display);font-size:clamp(1.4rem,2vw,1.8rem);font-weight:700;letter-spacing:-1px;margin-bottom:10px;position:relative">趋势已经明确，<em>工具还没就位</em></h2>

    </a>
  </div>
</section>

<!-- ========== FOOTER ========== -->

        <p><strong>法律层面</strong>：2024 年 7 月 1 日实施的新《公司法》，彻底取消了"一个自然人只能设立一家一人有限责任公司"的限制，放宽了设立子公司的限制条件，同时将实缴资本缴纳期限延长至 5 年<sup><a href="#ref-10">[10]</a></sup>。这为规模化 OPC 提供了完整的法律基础架构。</p>

        <p><strong>税务层面</strong>：2026 年的税收优惠力度前所未有。月销售额不超过 10 万元的 OPC 免征增值税；符合小微企业条件的一人公司，企业所得税实际税负仅 5%；个体工商户个人所得税减半征收——这些政策执行期均已明确延长至 <strong>2027 年底</strong><sup><a href="#ref-11">[11]</a></sup>。</p>

        <p>法律打开了门，税务降低了槛，城市政策提供了路。三者叠加，构成了中国 OPC 创业史上最友好的制度环境。</p>

        <div class="section-break"></div>

        <h2>五、对创业者意味着什么</h2>

        <p>如果你是一名考虑 AI 创业的独立创业者，2026 年的政策环境提供了三重确定性：</p>

        <p><strong>确定性一：成本可控。</strong>算力补贴、模型券、免费办公空间——政府在帮你压低 AI 创业最大的变动成本。龙岗区的 100 万元 AI 调用补贴，对于一人公司来说，可能意味着一整年的零算力成本<sup><a href="#ref-4">[4]</a></sup>。</p>

        <p><strong>确定性二：身份合法。</strong>新《公司法》让一人公司获得了与多人公司完全平等的法律地位。你不再需要找一个"挂名股东"来满足注册要求。</p>

        <p><strong>确定性三：不是孤军奋战。</strong>OPC 社区模式意味着，独立创业不等于孤独创业。共享空间、社群网络、政策对接——一人公司也可以有"生态"。</p>

        <p>深圳的行动计划，北京的模数社区，上海的 288 计划——这些不是地方政府的一时兴起，而是一个明确的时代信号：<em>AI 时代的一人公司，正在从"民间自发"走向"制度化支持"。</em></p>

        <p>对 Solarian 而言，这意味着我们面向的不再是一个需要被"说服"的市场，而是一个正在被政策推动、加速扩大的市场。</p>

<h3>一人公司的完整基建清单</h3>

<p>以下是目前验证可用的最精简工具栈，覆盖一家互联网公司从开发到收款的全部环节：</p>

<ul>

  <li><strong>Supabase（免费）</strong> — 开源后端，底层 PostgreSQL，提供数据库、认证、实时订阅和存储。两个项目、500MB 数据库，对 MVP 绰绰有余。</li>
  <li><strong>Vercel（免费）</strong> — 部署平台，git push 即上线，自带 CDN 和边缘计算。</li>
  <li><strong>Namecheap（约 $1/月）</strong> — 域名注册，.com 约 $12/年。有自己的域名，是"认真做产品"和"玩玩而已"的分水岭。</li>
  <li><strong>Stripe（0 月费，2.9% 交易抽成）</strong> — 在线支付基础设施，从收第一笔到百万级交易，用同一套系统。</li>
  <li><strong>GitHub（免费）</strong> — 代码版本控制，同时也是整个项目的协作与 CI/CD 枢纽。</li>
  <li><strong>Clerk（免费，1 万月活内）</strong> — 用户认证，提供完整登录 / 注册 / OAuth / MFA 组件。比自己写 auth 省几天时间，且更安全。</li>
  <li><strong>Resend（免费，3,000 封/月）</strong> — 开发者邮件服务，用于验证码、通知、营销邮件。</li>
  <li><strong>Cloudflare（免费）</strong> — DNS + CDN + DDoS 防护 + SSL，行业标准操作。</li>
  <li><strong>PostHog（免费，百万事件/月）</strong> — 产品分析平台，事件追踪 + 漏斗分析 + A/B 测试。</li>

  <li><strong>Upstash（免费，1 万次请求/天）</strong> — Serverless Redis，用于缓存、速率限制、会话存储。</li>

<h3>这张清单的真正意义</h3>

<p>不是"便宜"，而是<strong>职能的完整覆盖</strong>。</p>

<p>这 13 个工具，分别对应一家互联网公司的开发层（Claude + GitHub）、后端与数据层（Supabase + Upstash + Pinecone）、部署与基础设施层（Vercel + Namecheap + Cloudflare）、用户与支付层（Clerk + Stripe），以及运维与监控层（Resend + PostHog + Sentry）。</p>

<p>五年前，这些职能对应的是五个以上专职人员，加上动辄几万元/月的服务器开销。现在，它们被打包成"一键即用"的 SaaS 服务，90% 以上对个人和早期项目完全免费。</p>

<h3>你一个人，就是一家公司</h3>

<p>一人公司的核心，从来不是"一个人干所有活"，而是"一个人掌控全部决策权和 100% 的利润"。AI 和工具接管了执行层，你负责判断什么值得做，以及怎么做。</p>

// ========== RENDER GALLERY ==========
const gallery = document.getElementById('gallery');
articles.forEach((a, i) => {
  const card = document.createElement('div');
  card.className = 'gallery-card reveal';
  if (i > 0) card.style.animationDelay = (i * 60) + 'ms';

  const coverHTML = a.cover
    ? `<img class="card-cover" src="${a.cover}" alt="" loading="lazy">`
    : `<div class="card-cover-placeholder ${a.grad || 'grad-1'}"></div>`;

  card.innerHTML = `
    ${coverHTML}
    <div class="card-body">
      <span class="card-tag ${a.tagClass}">${a.tag}</span>

    </div>
  `;

// ========== ARTICLE VIEW ==========
let currentTocObserver = null;

function openArticle(a) {
  var coverHTML = a.cover
    ? '<img class="article-cover" src="' + a.cover + '" alt="">'
    : '<div class="article-cover-grad card-cover-placeholder ' + (a.grad || 'grad-1') + '"></div>';

  document.getElementById('articleContent').innerHTML =
    coverHTML +
    '<span class="card-tag ' + a.tagClass + '">' + a.tag + '</span>' +
    '<h1>' + a.title + '</h1>' +
    '<div class="article-meta">' + a.source + ' &middot; ' + a.date + ' &middot; ' + a.readTime + '</div>' +
    '<div class="article-body">' + a.content + '</div>';

  // Populate sidebar metadata
  document.getElementById('articleMeta').innerHTML =
    '<strong>' + a.source + '</strong>' +
    a.date + ' · ' + a.readTime;

  // Build TOC from h2 elements
  buildTOC();

  document.getElementById('blogGallery').style.display = 'none';
  document.getElementById('blogArticle').style.display = 'block';
  window.scrollTo(0, 0);
}

function buildTOC() {
  var content = document.getElementById('articleContent');
  var toc = document.getElementById('articleToc');
  var label = document.getElementById('tocLabel');
  toc.innerHTML = '';

  var h2s = content.querySelectorAll('.article-body h2');
  label.style.display = h2s.length ? '' : 'none';
  if (!h2s.length) return;

  h2s.forEach(function(h2, i) {
    h2.id = 'sec-' + i;
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.dataset.target = h2.id;
    a.textContent = h2.textContent;
    a.addEventListener('click', function(e) {
      e.preventDefault();
      h2.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    li.appendChild(a);
    toc.appendChild(li);
  });

  // Scroll-spy
  if (currentTocObserver) currentTocObserver.disconnect();
  var tocLinks = toc.querySelectorAll('a');
  currentTocObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        tocLinks.forEach(function(link) {
          link.classList.toggle('active', link.dataset.target === e.target.id);
        });
      }
    });
  }, { rootMargin: '-20% 0px -60% 0px' });
  h2s.forEach(function(h) { currentTocObserver.observe(h); });
}

function closeArticle() {
  document.getElementById('blogGallery').style.display = '';
  document.getElementById('blogArticle').style.display = 'none';
  if (currentTocObserver) { currentTocObserver.disconnect(); currentTocObserver = null; }
  window.scrollTo(0, 0);
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeArticle(); });

// ========== SPOTLIGHT ==========
const s = document.getElementById('spot');
document.addEventListener('mousemove', e => {
  s.style.setProperty('--mx', e.clientX + 'px');
  s.style.setProperty('--my', e.clientY + 'px');
});

// ========== NAV SCROLL ==========
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', scrollY > 40);
});

// ========== SCROLL REVEAL ==========
const obs = new IntersectionObserver(es => {
  es.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
}, { threshold: .12, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

// ========== PARTICLES ==========
const pc = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const sp = document.createElement('span');
  sp.style.left = Math.random() * 100 + '%';

  sp.style.animationDelay = Math.random() * 8 + 's';
  sp.style.width = sp.style.height = (1 + Math.random() * 2) + 'px';
  pc.appendChild(sp);
}
