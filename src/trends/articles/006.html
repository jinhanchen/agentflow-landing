<p>2024 年 7 月 1 日，修订后的《中华人民共和国公司法》正式实施。其中最具突破性的变化之一，是<strong>明确允许一个自然人设立一人有限责任公司</strong>，且取消了过去对一人公司的诸多限制。</p>
<p>旧法下，一人有限责任公司面临注册资本实缴要求、不能再投资设立新的一人公司等限制。新法大幅简化了这些条款，让一人公司在法律地位上与多人公司完全平等。</p>
<p>法律界人士指出，这一修订为 AI 时代的一人创业提供了制度基础。<strong>当技术上一个人已经可以运营一家完整的公司，法律不应成为障碍。</strong>新法的出台，标志着中国在制度层面正式拥抱"一人公司"这一新型组织形态。</p>
