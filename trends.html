<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0f1a;
  --bg-card:#141418;
  --bg-card-hover:#1a1a20;
  --border:rgba(255,255,255,0.06);
  --border-hover:rgba(255,255,255,0.12);
  --text:rgba(255,255,255,0.9);
  --text-sub:rgba(255,255,255,0.5);
  --text-dim:rgba(255,255,255,0.25);
  --accent:#14b8a6;
  --accent-sub:rgba(20,184,166,0.15);
  --accent-glow:rgba(20,184,166,0.08);
  --font-display:'Space Grotesk','Noto Sans SC',sans-serif;
  --font-body:'DM Sans','Noto Sans SC',sans-serif;
  --ease:cubic-bezier(0.25,1,0.5,1);
  --tag-policy:#3b82f6;
  --tag-case:#22c55e;
  --tag-trend:#a855f7;
  --tag-opinion:#f97316;
  --tag-insight:#14b8a6;
  --tag-story:#ec4899;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  font-weight:350;
}
a{color:inherit;text-decoration:none}

/* ========== SPOTLIGHT ========== */
.spotlight{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(20,184,166,0.04),transparent 60%);
}

/* ========== AMBIENT PARTICLES ========== */
.particles{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}
.particles span{
  position:absolute;
  width:2px;height:2px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  animation:drift linear infinite;
}
@keyframes drift{
  0%{transform:translateY(0) scale(1);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-100vh) scale(0.5);opacity:0}
}

/* ========== SCROLL REVEAL ========== */
.reveal{opacity:0;transform:translateY(36px)}
.reveal.vis{opacity:1;animation:springUp .85s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes springUp{
  0%{opacity:0;transform:translateY(36px)}
  60%{opacity:1;transform:translateY(-5px)}
  80%{transform:translateY(2px)}
  100%{opacity:1;transform:translateY(0)}
}
@media(prefers-reduced-motion:reduce){.reveal.vis{animation:none;opacity:1;transform:none}}

/* ========== LAYOUT ========== */
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding-inline:40px}
.center{text-align:center;display:flex;flex-direction:column;align-items:center}

/* ========== NAV ========== */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:16px 0;
  transition:background .3s,border-color .3s;
  border-bottom:1px solid transparent;
}
nav.scrolled{
  background:rgba(10,15,26,0.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom-color:var(--border);
}
.nav-inner{
  width:100%;max-width:none;padding-inline:40px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:var(--font-display);font-size:1.05rem;font-weight:600;
  display:flex;align-items:center;gap:9px;letter-spacing:-.3px;
}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none}
.nav-links a{font-size:.85rem;font-weight:400;color:var(--text-sub);transition:color .2s}
.nav-links a:hover{color:var(--text)}

/* ========== BUTTONS ========== */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:100px;
  font-family:var(--font-body);font-size:.88rem;font-weight:500;
  border:1px solid var(--border);background:transparent;color:var(--text);
  cursor:pointer;transition:all .25s var(--ease);
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  transition:none;
}
.btn:hover::after{left:120%;transition:left .6s var(--ease)}
.btn:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn svg{width:14px;height:14px;transition:transform .3s var(--ease)}
.btn:hover svg{transform:translateX(4px)}

.btn-fill{
  background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600;
}
.btn-fill:hover{border-color:var(--accent)}
.btn-fill::after{
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
}
.btn-nav{padding:7px 18px;font-size:.82rem;border-radius:100px}

/* ========== PAGE HERO ========== */
.page-hero h1 em{font-style:normal;color:var(--accent)}

/* ========== GALLERY GRID ========== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  margin-top:20px;
}

/* ========== GALLERY CARD ========== */
.gallery-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:all .3s var(--ease);
  display:flex;flex-direction:column;
}
.gallery-card:hover{
  border-color:var(--border-hover);
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,0.3);
}

.card-cover{
  aspect-ratio:16/10;
  width:100%;
  object-fit:cover;
  display:block;
  border-radius:12px 12px 0 0;
}
.card-cover-placeholder{
  aspect-ratio:16/10;
  width:100%;
  border-radius:12px 12px 0 0;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  color:rgba(255,255,255,0.15);
}
.card-cover-placeholder.grad-1{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.card-cover-placeholder.grad-2{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)}
.card-cover-placeholder.grad-3{background:linear-gradient(135deg,#1a0533,#2d1b69,#1a1a2e)}
.card-cover-placeholder.grad-4{background:linear-gradient(135deg,#1b1b2f,#162447,#1f4068)}
.card-cover-placeholder.grad-5{background:linear-gradient(135deg,#0d1b2a,#1b2838,#2d4654)}
.card-cover-placeholder.grad-6{background:linear-gradient(135deg,#1a1a2e,#2a1a3e,#1a2a3e)}

.card-body{
  padding:16px;
  display:flex;flex-direction:column;gap:8px;
  flex:1;
}

.card-tag{
  display:inline-flex;
  align-self:flex-start;
  font-size:.65rem;
  font-weight:600;
  letter-spacing:.5px;
  padding:3px 10px;
  border-radius:100px;
  text-transform:uppercase;
}
.tag-policy{background:rgba(59,130,246,0.15);color:var(--tag-policy)}
.tag-case{background:rgba(34,197,94,0.15);color:var(--tag-case)}
.tag-trend{background:rgba(168,85,247,0.15);color:var(--tag-trend)}
.tag-opinion{background:rgba(249,115,22,0.15);color:var(--tag-opinion)}
.tag-insight{background:rgba(20,184,166,0.15);color:var(--tag-insight)}
.tag-story{background:rgba(236,72,153,0.15);color:var(--tag-story)}

.card-title{
  font-family:var(--font-display);
  font-size:.95rem;
  font-weight:600;
  line-height:1.35;
  letter-spacing:-.3px;
}
.card-desc{
  font-size:.78rem;
  color:var(--text-sub);
  line-height:1.55;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-meta{
  font-size:.68rem;
  color:var(--text-dim);
  margin-top:auto;
  padding-top:4px;
}

/* ========== ARTICLE READING VIEW ========== */
.blog-article{
  max-width:720px;margin:0 auto;padding:120px 24px 80px;
}
.article-back{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--accent);font-size:.85rem;cursor:pointer;
  margin-bottom:24px;transition:opacity 0.2s;
  user-select:none;
}
.article-back:hover{opacity:0.7}

.article-page .article-cover{
  width:100%;border-radius:12px;margin-bottom:24px;
  display:block;
}
.article-page .article-cover-grad{
  width:100%;aspect-ratio:16/9;border-radius:12px;margin-bottom:24px;
}
.article-page .card-tag{margin-bottom:12px}
.article-page h1{
  font-family:var(--font-display);
  font-size:clamp(1.3rem,2.5vw,1.6rem);
  font-weight:700;color:#fff;
  margin-bottom:12px;line-height:1.3;
  letter-spacing:-1px;
}
.article-page .article-meta{
  font-size:.78rem;color:rgba(255,255,255,0.35);
  margin-bottom:24px;padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.article-page .article-body{
  font-size:.92rem;color:rgba(255,255,255,0.7);line-height:1.9;
}
.article-page .article-body p{margin-bottom:16px}
.article-page .article-body p:last-child{margin-bottom:0}
.article-page .article-body strong{color:var(--text);font-weight:500}
.article-page .article-body blockquote{
  border-left:3px solid var(--accent);
  padding-left:16px;
  margin:20px 0;
  font-style:italic;
  color:var(--text-sub);
}

/* ========== CTA BOX ========== */
.cta-box{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;padding:72px 40px;text-align:center;
  position:relative;overflow:hidden;
}
.cta-box::before{
  content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:400px;height:250px;
  background:radial-gradient(ellipse,var(--accent-glow),transparent 70%);
  pointer-events:none;
}
.cta-box h2 em{font-style:normal;color:var(--accent)}
.cta-sub{font-size:.92rem;color:var(--text-sub);margin-bottom:32px;position:relative}

/* ========== FOOTER ========== */
footer{
  position:relative;z-index:1;
  border-top:1px solid var(--border);padding:32px 0;
}
.footer-inner{
  max-width:1100px;margin:0 auto;padding-inline:40px;
  display:flex;justify-content:space-between;align-items:center;
}
.footer-copy{font-size:.72rem;color:var(--text-dim)}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:.72rem;color:var(--text-dim);transition:color .2s}
.footer-links a:hover{color:var(--text-sub)}

/* ========== MOBILE ========== */
@media(max-width:768px){
  .wrap{padding-inline:20px}
  .nav-inner{padding-inline:20px}
  .nav-links{gap:16px}
  .gallery{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .cta-box{padding:48px 20px}
  .footer-inner{flex-direction:column;gap:16px;text-align:center}
  .blog-article{padding:100px 16px 60px}
}
</style>

    content: `<p>2025 年全年新设个体工商户 1,619 万户，同比增长 12.4%。在这一波创业浪潮中，AI 工具的普及正在成为最大的加速器。</p>

// ========== RENDER GALLERY ==========
const gallery = document.getElementById('gallery');
articles.forEach((a, i) => {
  const card = document.createElement('div');
  card.className = 'gallery-card reveal';
  if (i > 0) card.style.animationDelay = (i * 60) + 'ms';

  const coverHTML = a.cover
    ? `<img class="card-cover" src="${a.cover}" alt="" loading="lazy">`
    : `<div class="card-cover-placeholder ${a.grad || 'grad-1'}"></div>`;

  card.innerHTML = `
    ${coverHTML}
    <div class="card-body">
      <span class="card-tag ${a.tagClass}">${a.tag}</span>
      <div class="card-title">${a.title}</div>
      <div class="card-desc">${a.desc}</div>
      <div class="card-meta">${a.source} · ${a.date} · ${a.readTime}</div>
    </div>
  `;
  card.addEventListener('click', () => openArticle(a));
  gallery.appendChild(card);
});

// ========== ARTICLE VIEW ==========
function openArticle(a) {
  var coverHTML = a.cover
    ? '<img class="article-cover" src="' + a.cover + '" alt="">'
    : '<div class="article-cover-grad card-cover-placeholder ' + (a.grad || 'grad-1') + '"></div>';

  document.getElementById('articleContent').innerHTML =
    coverHTML +
    '<span class="card-tag ' + a.tagClass + '">' + a.tag + '</span>' +
    '<h1>' + a.title + '</h1>' +
    '<div class="article-meta">' + a.source + ' &middot; ' + a.date + ' &middot; ' + a.readTime + '</div>' +
    '<div class="article-body">' + a.content + '</div>';

  document.getElementById('blogGallery').style.display = 'none';
  document.getElementById('blogArticle').style.display = 'block';
  window.scrollTo(0, 0);
}
function closeArticle() {
  document.getElementById('blogGallery').style.display = '';
  document.getElementById('blogArticle').style.display = 'none';
  window.scrollTo(0, 0);
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeArticle(); });

// ========== SPOTLIGHT ==========
const s = document.getElementById('spot');
document.addEventListener('mousemove', e => {
  s.style.setProperty('--mx', e.clientX + 'px');
  s.style.setProperty('--my', e.clientY + 'px');
});

// ========== NAV SCROLL ==========
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', scrollY > 40);
});

// ========== SCROLL REVEAL ==========
const obs = new IntersectionObserver(es => {
  es.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
}, { threshold: .12, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

// ========== PARTICLES ==========
const pc = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const sp = document.createElement('span');
  sp.style.left = Math.random() * 100 + '%';
  sp.style.top = Math.random() * 100 + 'vh';
  sp.style.animationDuration = (8 + Math.random() * 12) + 's';
  sp.style.animationDelay = Math.random() * 8 + 's';
  sp.style.width = sp.style.height = (1 + Math.random() * 2) + 'px';
  pc.appendChild(sp);
}
</script>
</body>
