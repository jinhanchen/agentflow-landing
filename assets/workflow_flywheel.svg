<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="'Noto Sans SC', 'Space Grotesk', sans-serif">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="progressLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#eab308" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(20,184,166,0.12)"/>
      <stop offset="100%" stop-color="rgba(20,184,166,0.04)"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.1)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0.03)"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.1)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0.03)"/>
    </linearGradient>
    <linearGradient id="nodeGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(94,234,212,0.1)"/>
      <stop offset="100%" stop-color="rgba(94,234,212,0.03)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr1" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L8,3.5 L0,6.5" fill="#14b8a6" opacity="0.85"/>
    </marker>
    <marker id="arr2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L8,3.5 L0,6.5" fill="#06b6d4" opacity="0.85"/>
    </marker>
    <marker id="arr3" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L8,3.5 L0,6.5" fill="#818cf8" opacity="0.8"/>
    </marker>
    <marker id="arr4" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L8,3.5 L0,6.5" fill="#5eead4" opacity="0.8"/>
    </marker>
    <marker id="arrOut" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M0,0.5 L10,4.5 L0,8.5" fill="#14b8a6"/>
    </marker>
    <marker id="arrIn" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L8,3.5 L0,6.5" fill="#5eead4" opacity="0.7"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- BACKGROUND: Flywheel ring                     -->
  <!-- ============================================ -->
  <circle cx="320" cy="192" r="112" fill="none" stroke="rgba(20,184,166,0.035)" stroke-width="60"/>
  <circle cx="320" cy="192" r="112" fill="none" stroke="rgba(20,184,166,0.055)" stroke-width="1.2" stroke-dasharray="3 7"/>

  <!-- ============================================ -->
  <!-- FLYWHEEL ARROWS (clockwise, thicker)          -->
  <!-- ============================================ -->
  <path d="M 416,102 C 470,115 495,150 488,178" fill="none" stroke="#14b8a6" stroke-width="2.5" stroke-opacity="0.55" marker-end="url(#arr1)"/>
  <path d="M 488,218 C 495,248 470,282 416,295" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-opacity="0.55" marker-end="url(#arr2)"/>
  <path d="M 224,295 C 170,282 145,248 152,218" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arr3)"/>
  <path d="M 152,178 C 145,150 170,115 224,102" fill="none" stroke="#5eead4" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arr4)"/>

  <!-- ============================================ -->
  <!-- NODE ① TOP: 执行 Workflow (车间)              -->
  <!-- ============================================ -->
  <g transform="translate(320,72)">
    <rect x="-108" y="-38" width="216" height="82" rx="12" fill="url(#nodeGrad1)" stroke="#14b8a6" stroke-width="1.5"/>
    <!-- Badge -->
    <circle cx="-90" cy="-20" r="11" fill="rgba(20,184,166,0.25)" stroke="#14b8a6" stroke-width="1.2"/>
    <text x="-90" y="-15.5" fill="#5eead4" font-size="12" font-weight="700" text-anchor="middle">1</text>
    <!-- Title -->
    <text x="2" y="-16" fill="#5eead4" font-size="16" font-weight="700" text-anchor="middle">执行 Workflow</text>
    <!-- Conveyor belt -->
    <line x1="-80" y1="16" x2="80" y2="16" stroke="rgba(20,184,166,0.25)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Agent workstations -->
    <g>
      <circle cx="-58" cy="16" r="11" fill="rgba(20,184,166,0.2)" stroke="#14b8a6" stroke-width="1.2"/>
      <text x="-58" y="20" fill="#5eead4" font-size="8" font-weight="600" text-anchor="middle">调研</text>
      <circle cx="-20" cy="16" r="11" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.2"/>
      <text x="-20" y="20" fill="#67e8f9" font-size="8" font-weight="600" text-anchor="middle">文案</text>
      <circle cx="18" cy="16" r="11" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.2"/>
      <text x="18" y="20" fill="#a5b4fc" font-size="8" font-weight="600" text-anchor="middle">设计</text>
      <circle cx="56" cy="16" r="11" fill="rgba(94,234,212,0.2)" stroke="#5eead4" stroke-width="1.2"/>
      <text x="56" y="20" fill="#5eead4" font-size="8" font-weight="600" text-anchor="middle">审核</text>
      <!-- Tiny flow arrows -->
      <path d="M-45,16 L-33,16" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
      <path d="M-7,16 L5,16" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
      <path d="M31,16 L43,16" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
    </g>
    <!-- Subtitle -->
    <text x="0" y="37" fill="#64748b" font-size="10" text-anchor="middle">PM 调度 · 多 Agent 并行 · 车间模式</text>
  </g>

  <!-- ============================================ -->
  <!-- NODE ② RIGHT: PM 复盘                        -->
  <!-- ============================================ -->
  <g transform="translate(468,192)">
    <rect x="-62" y="-32" width="124" height="64" rx="10" fill="url(#nodeGrad2)" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="-45" cy="-14" r="11" fill="rgba(6,182,212,0.25)" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="-45" y="-9.5" fill="#67e8f9" font-size="12" font-weight="700" text-anchor="middle">2</text>
    <text x="8" y="-8" fill="#67e8f9" font-size="15" font-weight="600" text-anchor="middle">PM 复盘</text>
    <text x="0" y="12" fill="#94a3b8" font-size="11" text-anchor="middle">质量审查</text>
    <text x="0" y="26" fill="#94a3b8" font-size="11" text-anchor="middle">问题定位</text>
  </g>

  <!-- ============================================ -->
  <!-- NODE ③ BOTTOM: 经验沉淀                      -->
  <!-- ============================================ -->
  <g transform="translate(320,312)">
    <rect x="-100" y="-32" width="200" height="64" rx="10" fill="url(#nodeGrad3)" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="-82" cy="-14" r="11" fill="rgba(99,102,241,0.25)" stroke="#6366f1" stroke-width="1.2"/>
    <text x="-82" y="-9.5" fill="#a5b4fc" font-size="12" font-weight="700" text-anchor="middle">3</text>
    <text x="5" y="-8" fill="#a5b4fc" font-size="15" font-weight="600" text-anchor="middle">经验沉淀</text>
    <!-- Three experience type tags -->
    <g transform="translate(0, 17)">
      <rect x="-82" y="-10" width="50" height="20" rx="5" fill="rgba(20,184,166,0.1)" stroke="rgba(20,184,166,0.35)" stroke-width="0.8"/>
      <text x="-57" y="4" fill="#5eead4" font-size="10" font-weight="500" text-anchor="middle">Skill</text>
      <rect x="-25" y="-10" width="50" height="20" rx="5" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.35)" stroke-width="0.8"/>
      <text x="0" y="4" fill="#67e8f9" font-size="10" font-weight="500" text-anchor="middle">规则</text>
      <rect x="32" y="-10" width="50" height="20" rx="5" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.35)" stroke-width="0.8"/>
      <text x="57" y="4" fill="#a5b4fc" font-size="10" font-weight="500" text-anchor="middle">脚本</text>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- NODE ④ LEFT: 工作流进化                      -->
  <!-- ============================================ -->
  <g transform="translate(172,192)">
    <rect x="-62" y="-32" width="124" height="64" rx="10" fill="url(#nodeGrad4)" stroke="#5eead4" stroke-width="1.5"/>
    <circle cx="-45" cy="-14" r="11" fill="rgba(94,234,212,0.25)" stroke="#5eead4" stroke-width="1.2"/>
    <text x="-45" y="-9.5" fill="#5eead4" font-size="12" font-weight="700" text-anchor="middle">4</text>
    <text x="8" y="-8" fill="#5eead4" font-size="15" font-weight="600" text-anchor="middle">工作流进化</text>
    <text x="0" y="12" fill="#94a3b8" font-size="11" text-anchor="middle">结构优化</text>
    <text x="0" y="26" fill="#94a3b8" font-size="11" text-anchor="middle">自动重构</text>
  </g>

  <!-- ============================================ -->
  <!-- CENTER: Flywheel core                         -->
  <!-- ============================================ -->
  <g transform="translate(320,192)">
    <circle cx="0" cy="0" r="38" fill="rgba(20,184,166,0.04)" stroke="rgba(20,184,166,0.15)" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="26" fill="rgba(20,184,166,0.06)" stroke="rgba(20,184,166,0.08)" stroke-width="0.8"/>
    <!-- Spiral icon -->
    <path d="M-4,-10 C 10,-12 13,0 5,5 C -3,10 -13,5 -10,-4" fill="none" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-10,-4 L-14,-8 M-10,-4 L-6,-9" stroke="#14b8a6" stroke-width="1.2" stroke-linecap="round"/>
    <text x="0" y="20" fill="#14b8a6" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1.5">越转越好</text>
  </g>

  <!-- ============================================ -->
  <!-- INPUT / OUTPUT                                -->
  <!-- ============================================ -->
  <!-- Input -->
  <path d="M 82,42 Q 155,32 210,42" fill="none" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrIn)" opacity="0.75"/>
  <rect x="16" y="28" width="66" height="26" rx="5" fill="rgba(94,234,212,0.06)" stroke="rgba(94,234,212,0.25)" stroke-width="0.8"/>
  <text x="49" y="46" fill="#5eead4" font-size="12" font-weight="500" text-anchor="middle">用户目标</text>
  <!-- Output -->
  <path d="M 430,42 Q 505,32 556,42" fill="none" stroke="#14b8a6" stroke-width="2.5" marker-end="url(#arrOut)" filter="url(#glow)"/>
  <rect x="558" y="28" width="68" height="26" rx="5" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.45)" stroke-width="1"/>
  <text x="592" y="46" fill="#14b8a6" font-size="13" font-weight="700" text-anchor="middle">完整交付</text>

  <!-- ============================================ -->
  <!-- BOTTOM: Improvement Timeline                  -->
  <!-- ============================================ -->
  <g transform="translate(0,360)">
    <line x1="100" y1="8" x2="540" y2="8" stroke="rgba(255,255,255,0.03)" stroke-width="10" stroke-linecap="round"/>
    <line x1="100" y1="8" x2="540" y2="8" stroke="url(#progressLine)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- M1 -->
    <circle cx="130" cy="8" r="6" fill="#0a0f1a" stroke="#ef4444" stroke-width="1.8"/>
    <text x="130" y="-6" fill="#f87171" font-size="11" font-weight="600" text-anchor="middle">第 1 次</text>
    <!-- M2 -->
    <circle cx="320" cy="8" r="6" fill="#0a0f1a" stroke="#eab308" stroke-width="1.8"/>
    <text x="320" y="-6" fill="#facc15" font-size="11" font-weight="600" text-anchor="middle">第 5 次</text>
    <!-- M3 -->
    <circle cx="510" cy="8" r="6" fill="#0a0f1a" stroke="#14b8a6" stroke-width="1.8" filter="url(#glow)"/>
    <text x="510" y="-6" fill="#14b8a6" font-size="11" font-weight="700" text-anchor="middle">第 10 次</text>
  </g>
</svg>
